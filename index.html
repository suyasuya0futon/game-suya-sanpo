<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>suya sanpo</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&family=Noto+Serif+JP:wght@400;500;700&family=Rochester&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <canvas id="game" aria-label="suya sanpo 3D floating scene"></canvas>

  <main class="hud">
    <section class="topbar" aria-live="polite">
      <div class="meter">
        <span>Score</span>
        <strong id="score">0</strong>
      </div>
      <div class="meter">
        <span>Combo</span>
        <strong id="combo">x1</strong>
      </div>
      <div class="meter">
        <span>Shield</span>
        <strong id="shieldText">100%</strong>
        <div class="bar"><i id="shieldBar"></i></div>
      </div>
      <div class="meter">
        <span>Time</span>
        <strong id="time">90</strong>
      </div>
    </section>

    <section class="center" id="menu">
      <h1>suya sanpo</h1>
      <p class="lead">薄暗い夕暮れから星空へ、光のリングをくぐりながら<br>静かに浮遊する空の散歩です。<br><br>リングをくぐるとブーストの光がたまり、<br>SPACEキーを押している間だけ加速します。</p>
      <div class="actions">
        <button class="primary" id="start">START</button>
      </div>
    </section>

    <section class="bottom">
      <div class="tips">
        <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> / <kbd>↑</kbd><kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd> 移動
        <kbd>Space</kbd> ブースト
        <kbd>R</kbd> リスタート
      </div>
      <button class="sound" id="sound" aria-label="Sound on">♫</button>
    </section>
  </main>

  <div class="touch" aria-hidden="true">
    <div class="stick" id="stick"><div class="knob" id="knob"></div></div>
    <button class="boost" id="touchBoost" aria-label="Space boost">SPACE</button>
  </div>

  <div class="flash" id="flash"></div>
  <div class="space-shade" id="spaceShade"></div>

  <script type="module" src="./main.js"></script>
</body>
</html>
